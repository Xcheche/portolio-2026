{% extends 'base.html' %} {% load static %} {% block title %}Reset Password{%
endblock %} {% block content %}
<!-- ================================
    Start Content
    ================================= -->
<section>
  <div class="innerPageBannerCol">
    <div class="container">
      <div class="row g-4 g-md-3 align-items-center">
        <div class="col-md-6">
          <div class="bannerContent">
            <h1 class="xlTitle pb-md-3">Reset your password</h1>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section>
  <div class="lightBg">
    <div class="sectionSpaceSm">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm">
              <div class="card-body p-4 p-md-5">
                <form id="resetPasswordForm" class="accounts-form">
                  <div class="mb-3">
                    <label for="password1" class="form-label"
                      >New password</label
                    >
                    <input
                      type="password"
                      id="password1"
                      name="password1"
                      class="form-control"
                      placeholder="Create a password"
                    />
                    <div class="form-text">Minimum 8 characters.</div>
                  </div>

                  <div class="mb-4">
                    <label for="password2" class="form-label"
                      >Repeat password</label
                    >
                    <input
                      type="password"
                      id="password2"
                      name="password2"
                      class="form-control"
                      placeholder="Repeat your password"
                    />
                  </div>

                  <button class="btn btnPrimary w-100" type="submit">
                    Update password
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- ================================
    End Content
    ================================= -->

{% endblock %}
