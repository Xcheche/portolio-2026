<!doctype html>
{% load static %}
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script>
      (function() {
        var k = 'portolio-theme';
        var s = null;
        try { s = localStorage.getItem(k); } catch (e) {}
        var dark = typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = (s === 'light' || s === 'dark') ? s : (dark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <title>Cheche Coding - Home</title>
    <meta name="author" content="Did Coding Limited & James Granger Design">
    <link rel="canonical" href="" />
    <link rel="home" href="" />
    <meta name="description" content="">
    <meta name="keywords" content="">

    <link rel="shortcut icon" type="image/x-icon" href="images/icon.jpg">
    <link rel="apple-touch-icon" type="image/jpg" href="images/icon.jpg">

    <!-- ================================
    Start CSS
    ================================= -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/swiper-bundle.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <link href="{% static 'css/toastr.css' %}" rel="stylesheet">
    <!-- ================================
    End CSS
    ================================= -->
    <!--Font Awesome Icons-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>

<body>
  <!-- Decorative wave (CSS-only, GPU-accelerated, pointer-events: none) -->
  <div class="wave-bg" aria-hidden="true">
    <svg class="wave-svg" viewBox="0 0 1200 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="wave-path" d="M0,60 Q150,20 300,60 T600,60 T900,60 T1200,60 L1200,120 L0,120 Z"/>
        <path id="wave-path-2" d="M0,75 Q150,35 300,75 T600,75 T900,75 T1200,75 L1200,120 L0,120 Z"/>
      </defs>
      <g class="wave-layer wave-layer-1">
        <use href="#wave-path"/><use href="#wave-path" transform="translate(1200,0)"/>
      </g>
      <g class="wave-layer wave-layer-2">
        <use href="#wave-path-2"/><use href="#wave-path-2" transform="translate(1200,0)"/>
      </g>
    </svg>
  </div>

  {% include 'inc/nav/navbar.html' %}
  

    <!-- ================================
    Start Content
    ================================= -->
    {% block content %}
    {% endblock %}
    <!-- ================================
    End Content
    ================================= -->

    ================================= -->
    {% include 'inc/footer/footer.html' %}
    <!-- ================================
    End Footer
    ================================= -->

    <!-- ================================

    ================================= -->
    <script src="{% static 'js/global.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/swiper-bundle.min.js' %}"></script>
    <script src="{% static 'js/script.js' %}"></script>
    <script src="{% static 'js/toastr.js' %}"></script>
    <script src="{% static 'js/alert.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/theme.js' %}"></script>
    <!-- ================================
    End Scripts
    ================================= -->
</body>

</html>
