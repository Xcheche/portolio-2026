<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script>
      (function () {
        var k = "portolio-theme";
        var s = null;
        try {
          s = localStorage.getItem(k);
        } catch (e) {}
        var dark =
          typeof window !== "undefined" &&
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = s === "light" || s === "dark" ? s : dark ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <title>{% block title %}Cheche Coding - Home{% endblock %}</title>
    <meta name="author" content="Did Coding Limited & James Granger Design" />
    <link rel="canonical" href="" />
    <link rel="home" href="" />
    <meta name="description" content="" />
    <meta name="keywords" content="" />

    <link rel="shortcut icon" type="image/x-icon" href="images/icon.jpg" />
    <link rel="apple-touch-icon" type="image/jpg" href="images/icon.jpg" />

    <!-- ================================
    Start CSS
    ================================= -->
    <!-- <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet" /> -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="{% static 'css/swiper-bundle.min.css' %}" rel="stylesheet" />
    <link href="{% static 'css/style.css' %}" rel="stylesheet" />
    <link href="{% static 'css/toastr.css' %}" rel="stylesheet" />
    <link href="{% static 'css/enhancements.css' %}" rel="stylesheet" />
    <link href="{% static 'css/enterprise-auth.css' %}" rel="stylesheet" />
    <!-- ================================
    End CSS
    ================================= -->
    <!--Font Awesome Icons-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <style>
      :root {
        --splash-bg: radial-gradient(
          120% 120% at 20% 10%,
          #f8fafc 0%,
          #eef2ff 50%,
          #e2e8f0 100%
        );
        --splash-ink: #0f172a;
        --splash-accent: #2563eb;
        --splash-muted: #64748b;
      }

      [data-theme="dark"] {
        --splash-bg: radial-gradient(
          120% 120% at 20% 10%,
          #0b1220 0%,
          #0f172a 55%,
          #111827 100%
        );
        --splash-ink: #e2e8f0;
        --splash-accent: #38bdf8;
        --splash-muted: #94a3b8;
      }

      body.splash-locked {
        overflow: hidden;
      }

      .splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: var(--splash-bg);
        color: var(--splash-ink);
        transition:
          opacity 400ms ease,
          visibility 400ms ease;
      }

      .splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .splash-card {
        display: grid;
        gap: 16px;
        place-items: center;
        padding: 28px 32px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 18px 60px rgba(15, 23, 42, 0.18);
        backdrop-filter: blur(8px);
        text-align: center;
        width: min(440px, 92vw);
      }

      [data-theme="dark"] .splash-card {
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 18px 60px rgba(2, 6, 23, 0.5);
      }

      .splash-logo {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        object-fit: cover;
        box-shadow: 0 12px 30px rgba(37, 99, 235, 0.25);
      }

      .splash-title {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .splash-subtitle {
        font-size: 14px;
        color: var(--splash-muted);
      }

      .splash-loader {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        border: 3px solid rgba(37, 99, 235, 0.2);
        border-top-color: var(--splash-accent);
        animation: splash-spin 1s linear infinite;
      }

      .splash-progress {
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.12);
        overflow: hidden;
      }

      .splash-progress span {
        display: block;
        height: 100%;
        width: 40%;
        border-radius: inherit;
        background: linear-gradient(
          90deg,
          transparent,
          var(--splash-accent),
          transparent
        );
        animation: splash-progress 1.2s ease-in-out infinite;
      }

      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes splash-progress {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(250%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .splash-loader,
        .splash-progress span {
          animation: none;
        }
      }

      .btn,
      .btn-primary,
      .btn-outline-primary,
      .btnPrimary,
      .btnOutline {
        background: #ffffff !important;
        color: #000000 !important;
        border: 1px solid #000000 !important;
      }

      .btn:hover,
      .btn-primary:hover,
      .btn-outline-primary:hover,
      .btnPrimary:hover,
      .btnOutline:hover {
        background: #000000 !important;
        color: #ffffff !important;
        border-color: #000000 !important;
      }
    </style>
  </head>

  <body>
    <div
      class="splash-screen"
      id="splash-screen"
      role="status"
      aria-live="polite"
    >
      <div class="splash-card">
        <img
          class="splash-logo"
          src="{% static 'images/user-img.jpg' %}"
          alt="Portfolio"
        />
        <div class="splash-title">Cheche Coding</div>
        <div class="splash-subtitle">Crafting sleek, fast experiences</div>
        <div class="splash-loader" aria-hidden="true"></div>
        <div class="splash-progress" aria-hidden="true"><span></span></div>
      </div>
    </div>
    <!-- Skip to main content link for keyboard navigation -->
    <a href="#main-content" class="sr-only btn btn-primary">
      Skip to main content
    </a>

    <!-- Decorative wave (CSS-only, GPU-accelerated, pointer-events: none) -->
    <div class="wave-bg" aria-hidden="true">
      <svg
        class="wave-svg"
        viewBox="0 0 1200 120"
        preserveAspectRatio="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <defs>
          <path
            id="wave-path"
            d="M0,60 Q150,20 300,60 T600,60 T900,60 T1200,60 L1200,120 L0,120 Z"
          />
          <path
            id="wave-path-2"
            d="M0,75 Q150,35 300,75 T600,75 T900,75 T1200,75 L1200,120 L0,120 Z"
          />
        </defs>
        <g class="wave-layer wave-layer-1">
          <use href="#wave-path" />
          <use href="#wave-path" transform="translate(1200,0)" />
        </g>
        <g class="wave-layer wave-layer-2">
          <use href="#wave-path-2" />
          <use href="#wave-path-2" transform="translate(1200,0)" />
        </g>
      </svg>
    </div>

    {% include 'inc/nav/navbar.html' %}

    <!-- ================================
    Start Content
    ================================= -->
    <main id="main-content" role="main">
      {% block content %} {% endblock %}
    </main>
    <!-- ================================
    End Content
    ================================= -->

    <!-- ================================
    Start Footer
    ================================= -->
    {% include 'inc/footer/footer.html' %}
    <!-- ================================
    End Footer
    ================================= -->

    <!-- ================================
    Start Scripts
    ================================= -->
    <script>
      (function () {
        var splash = document.getElementById("splash-screen");
        if (!splash) {
          return;
        }

        document.body.classList.add("splash-locked");

        var hideSplash = function () {
          splash.classList.add("hidden");
          document.body.classList.remove("splash-locked");
        };

        window.addEventListener("load", function () {
          window.setTimeout(hideSplash, 2200);
        });

        window.setTimeout(hideSplash, 7500);
      })();
    </script>
    <script src="{% static 'js/global.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/swiper-bundle.min.js' %}"></script>
    <script src="{% static 'js/script.js' %}"></script>
    <script src="{% static 'js/toastr.js' %}"></script>
    <script src="{% static 'js/alert.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/theme.js' %}"></script>
    <script src="{% static 'js/theme-toggle.js' %}"></script>
    <script src="{% static 'js/form-validation.js' %}"></script>
    <!-- ================================
    End Scripts
    ================================= -->
  </body>
</html>
