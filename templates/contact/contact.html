{% extends 'base.html' %} {% load static %} {% block title %}Contact - Cheche
Coding{% endblock %} {% block content %}

<!-- ================================
    Start Content
    ================================= -->
<section>
  <div class="innerPageBannerCol">
    <div class="container">
      <div class="row g-4 g-md-3 align-items-center">
        <div class="col-md-6">
          <div class="bannerContent">
            <h1 class="xlTitle pb-md-3">Contact us below</h1>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="contact-section">
  <div class="contact-section-wrapper">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="contact-form-wrapper">
            <form id="contactForm" class="contact-form" novalidate>
              <div class="form-group">
                <label for="name" class="form-label">
                  Name
                  <span class="aria-required" aria-label="required">*</span>
                </label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  class="form-control"
                  placeholder="Your name"
                  required
                />
                <div class="invalid-feedback">
                  Please provide a name.
                </div>
              </div>

              <div class="form-group">
                <label for="email" class="form-label">
                  Email
                  <span class="aria-required" aria-label="required">*</span>
                </label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-control"
                  placeholder="you@example.com"
                  required
                />
                <div class="invalid-feedback">
                  Please provide a valid email address.
                </div>
              </div>

              <div class="form-group">
                <label for="message" class="form-label">
                  Message
                  <span class="aria-required" aria-label="required">*</span>
                </label>
                <textarea
                  id="message"
                  name="message"
                  class="form-control"
                  placeholder="Write something..."
                  rows="6"
                  required
                  minlength="10"
                ></textarea>
                <div class="form-text">Minimum 10 characters.</div>
                <div class="invalid-feedback">
                  Please provide a message (at least 10 characters).
                </div>
              </div>

              <div class="form-status" role="alert"></div>

              <button class="btn btnPrimary w-100" type="submit">
                Submit
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- ================================
    End Content
    ================================= -->

{% endblock %}
