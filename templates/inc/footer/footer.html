
{% load static %}
<footer role="contentinfo">
    <div class="footerCol">
        <div class="container">
            <ul class="socialCol">
                <li><a href="javascript:void(0)"><img src="{% static 'images/fb.svg' %}" alt="..."></a></li>
                <li><a href="javascript:void(0)"><img src="{% static 'images/insta.svg' %}" alt="..."></a></li>
                <li><a href="javascript:void(0)"><img src="{% static 'images/twitter.svg' %}" alt="..."></a></li>
                <li><a href="javascript:void(0)"><img src="{% static 'images/linkedin.svg' %}" alt="..."></a></li>
            </ul>
            <div class="copyrightCol">
                <form id="newsletterForm">
                    <input type="email" id="email" name="email"
                        placeholder="Add your email to subscribe to our newsletter..">
                    <input class='btn btnPrimary' type="submit" value="Submit">
                </form>
            </div>
            <div class="copyrightCol">
                <p>{{ footer_info.copy_right }}  <a href="https://jamesgrangerdesign.co.uk/"
                        target="_blank">Made by {{ footer_info.my_name }}</a></p>
                        <p>{{ footer_info.footer_message }}</p>

  <p>{{ footer_info.current_time }}</p>
            </div>
        </div>
    </div>
</footer>
