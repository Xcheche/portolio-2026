{% extends 'base.html' %}
 
{% block title %}Confirm Delete Portfolio{% endblock %}

{% block content %}
    <div class="container py-5 pt-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="h4 fw-bold text-danger mb-3 mt-5">Confirm Delete Portfolio</h2>
                        <div class="alert alert-warning mb-4" role="alert">
                            Are you sure you want to delete <strong>"{{ portfolio.title }}"</strong>? This action cannot be undone.
                        </div>

                        <form method="post" class="d-flex flex-wrap gap-2">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                            <a href="{% url 'home' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
